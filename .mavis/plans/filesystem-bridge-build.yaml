      ## 7 audit checks (independent re-derivation)

      1. **`load_full_topic` path-traversal protection** — Find the
         path validation. Confirm it uses `os.path.realpath` and
         verifies the resolved path starts with `realpath(vault_root) + os.sep`.
         Try to bypass: construct a note_path like `../../../etc/passwd`
         and confirm `load_full_topic` raises (ValueError or similar)
         rather than reading outside the vault. FAIL if the check is
         missing or uses only string-prefix matching without realpath.

      2. **`atomic_write` actually does fsync** — Confirm the temp
         write is followed by `os.fsync()` before `os.rename()`. The
         order matters: temp file → fsync → rename. FAIL if fsync is
         missing or comes after rename.

      3. **`atomic_write` cleans up temp file on failure** — Find the
         try/finally or context manager. Confirm the temp file is
         removed in the failure path. Construct a failure (e.g., make
         the target dir read-only) and verify no `<target>.tmp.*` files
         leak. FAIL if the cleanup is missing.

      4. **`Tier3Loader.evict_if_stale` enforces 30-min hard floor** —
         Confirm `evict_if_stale` refuses to evict entries with
         `now - cached_at < 1800` regardless of importance. Test:
         cache an entry with importance=0.0 (would normally evict),
         call `evict_if_stale(now=cached_at + 60)`, confirm the entry
         is NOT evicted. Then call
         `evict_if_stale(now=cached_at + 3600)`, confirm it IS evicted
         (because floor is satisfied AND importance < threshold). FAIL
         if the floor isn't enforced.

      5. **No external dependencies** — Grep the file for `import`
         statements. Confirm all are stdlib (`os`, `tempfile`, `time`,
         `pathlib`, `hashlib`, `secrets`, `json`, `dataclasses`,
         `typing`). FAIL on any third-party import.

      6. **Self-tests pass with the atomic-write + Tier3Loader
         behaviors** — Run
         `python3 03 Projects/Builder/drafts/filesystem_bridge.py`
         yourself. Confirm exit 0 and the expected output (the
         self-test prints the stats and a per-check status). FAIL if
         any check fails or the script errors.

      7. **`test_filesystem_bridge.py` exists and runs** — Run
         `python3 03 Projects/Builder/drafts/test_filesystem_bridge.py`
         yourself. Confirm exit 0 and a meaningful test report
         (e.g., unittest/pytest output showing all tests pass). FAIL
         if the test file is missing, the script errors, or tests
         fail.

