      ### filesystem_bridge.py — Tier 3 lazy loader with macOS atomic writes

      Build a runnable Python module (executable as
      `python3 filesystem_bridge.py` for the self-test). It must
      implement:

      - **`load_full_topic(vault_root: str, note_path: str) -> str`**:
        Lazy load a single full topic (Tier 3) from the Obsidian Vault
        directly via filesystem. Bypasses API serialization token
        overhead. Returns the file contents as a string. If the file
        doesn't exist, raises `FileNotFoundError` with the resolved
        path (so the caller can distinguish "topic not yet captured"
        from "load failure"). The vault root is validated to be
        absolute and to exist before any file read. The note_path is
        resolved relative to vault_root and **must not escape the
        vault** (use `os.path.realpath` and check the resolved path
        starts with `realpath(vault_root) + os.sep`). This is the
        security boundary that prevents path traversal attacks.

      - **`atomic_write(target_path: str, content: str) -> None`**:
        Atomic write pattern. Write to `<target_path>.tmp.<pid>.<rand>`,
        `os.fsync()` the temp file, then `os.rename()` to the final
        path (rename is atomic on POSIX and macOS APFS). The temp
        file MUST be cleaned up on any failure (try/finally). The
        target_path's parent dir is created with `os.makedirs(...,
        exist_ok=True)` before the write. The fsync is non-negotiable
        — it ensures the bytes hit disk before the rename, so a crash
        between rename and a delayed fsync can't leave a partial
        file visible.

      - **`Tier3Loader` class** that wraps `load_full_topic` with:
        - An in-memory LRU+importance cache (max 64 entries, evict by
          `(recency × importance)` with a 30-min hard floor matching
          the v1 design doc Section 4.2)
        - A `load(vault_root, note_path, importance: float = 0.5) -> str`
          method that checks cache first, calls `load_full_topic` on
          miss, caches the result with the importance score, and
          returns
        - An `evict_if_stale(now: float) -> list[str]` method that
          evicts entries where `now - cached_at >= 1800` ONLY if
          importance is below the eviction threshold (default 0.3);
          the 30-min hard floor is enforced (never evict before 30
          min regardless of score)
        - A `stats() -> dict` method returning cache hits, misses,
          evictions, total bytes served

      - **macOS Full Disk Access compatibility note** (in module
        docstring): the bridge requires FDA-granted access to the
        Vault directory. Document the FDA prerequisite in the module
        docstring so a reader knows what to grant at the OS level.
        No actual FDA check in code (that's an OS concern, not a
        Python concern); just document it.

      - **Self-test**: a `__main__` block that:
        1. Creates a temp dir as fake vault
        2. Writes 2 test files via `atomic_write` to the fake vault
        3. Reads them back via `load_full_topic` and `Tier3Loader.load`
        4. Calls `atomic_write` a second time to overwrite a file —
          verifies no temp file leaks
        5. Calls `evict_if_stale` with `now=current+3600` and verifies
          it evicts when importance is low
        6. Calls `evict_if_stale` with `now=current+60` and verifies
          the 30-min hard floor holds
        7. Prints the `Tier3Loader.stats()` output
        8. Cleans up the temp vault
        Self-test exits 0 on success.

      - **No external dependencies**. Standard library only (`os`,
        `tempfile`, `time`, `pathlib`, `hashlib`, `secrets`).

