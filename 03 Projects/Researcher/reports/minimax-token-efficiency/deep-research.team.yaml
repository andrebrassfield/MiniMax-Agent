version: 1
plan:
  name: "deep-research-minimax-token-efficiency"
  # 1: deep-research is a file-input pipeline where each step reads the
  # previous step's output; concurrency would only introduce read/write
  # races on the canonical files (background.md, judgment.md, ...).
  max_concurrency: 1
  # 3 consecutive failures stop the plan. A single task retrying forever
  # burns budget without producing a better file; cut the run after 3.
  max_consecutive_failures: 3
  # 5 steps x 1 retry = 5 success-path cycles. 10 gives ~2x headroom for
  # one or two retries across the pipeline before the cap kicks in.
  max_cycles: 10
  # No per-step verifiers (verify_skip_reason below), so the engine has
  # no one to wait on. auto-accept lets the next step start immediately.
  auto_accept: true
  # No verifier -> no reject path. Pin to 0 explicitly so a future
  # 'harmonize with the verifier-using plans' change can't accidentally
  # turn this into a retry loop.
  auto_reject_retries: 0
